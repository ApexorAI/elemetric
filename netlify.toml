[build]
  publish = "mobile/docs"

[[redirects]]
  from = "/"
  to   = "/landing-page.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to   = "/landing-page.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
